name: elastic-iac
description: >
  Elastic Cloud Infrastructure-as-Code proposer tools (unified mcp-server-elastic-iac):
  read live cluster/Cloud state, read the GitLab repo, propose a config edit by committing
  a branch + opening a merge request via the GitLab REST API, and review the MR's CI
  pipeline. The agent never clones, never runs terraform, never pushes from a local
  checkout -- CI computes the plan on the MR and a human merges + applies from GitLab.
  apply/destroy/state-surgery and MR merge/approve are intentionally absent.
version: 1.0.0
input_schema:
  type: object
  properties:
    action:
      type: string
      enum: [read_state, read_repo, propose, open_mr, review_pipeline, status, query_context]
      description: Stage of the IaC proposer workflow to perform
    cluster:
      type: string
      description: Target Elastic Cloud deployment name (e.g. eu-b2b, gl-testing)
    branch:
      type: string
      description: Working branch (agent/<short>-<yyyymmdd>); never main
    project_id:
      type: string
      description: GitLab project ID or URL-encoded path for the IaC repo
    paths:
      type: array
      items: { type: string }
      description: Repo file paths under environments/<cluster>/ to read or propose edits to
  required: [action]
output_schema:
  type: object
  properties:
    result: { type: object }
annotations:
  requires_confirmation: true
  read_only: false
  cost: medium

prompt_template: >
  Drive the Elastic Cloud IaC proposer workflow against the unified elastic-iac server.
  {{#if compliance_tier}}Compliance tier: {{compliance_tier}} -- all actions are logged; human_in_the_loop is always.{{/if}}
  Never run terraform apply/destroy, never merge or approve an MR, never push to main.

related_tools:
  - "Use read_state before propose to ground the change in live deployment topology and plan history"
  - "Use review_pipeline to surface the CI-computed terraform plan to the human for review"
  - "Use open_mr only after the proposed config edit is committed to the branch"

tool_mapping:
  mcp_server: elastic-iac
  # Propose-only (SIO-912 removed the local-terraform path; SIO-925 pruned the dead
  # routing): no git_* (no clone/checkout/push) and no terraform_* (CI runs the plan).
  # SIO-967: kg_* are served by the in-process knowledge-graph MCP server (not the
  # elastic-iac server). The read path binds them directly via infoTools(); listing the
  # pattern here keeps the facade from filtering them out and documents the surface.
  mcp_patterns:
    - "gitlab_*"
    - "elastic_*"
    - "iac_*"
    - "kg_*"
  action_tool_map:
    read_state:
      - elastic_cloud_list_deployment_versions
      - elastic_cloud_get_deployment
      - elastic_cloud_list_deployments
      - elastic_cloud_get_plan_history
      - elastic_get_cluster_health
      - elastic_get_index_template
      - elastic_ilm_get_lifecycle
    read_repo:
      - gitlab_get_repository_tree
      - gitlab_get_file_content
    propose:
      - gitlab_get_file_content
      - gitlab_create_branch
      - gitlab_commit_file
    open_mr:
      - gitlab_create_merge_request
    review_pipeline:
      - gitlab_get_merge_request
      - gitlab_get_merge_request_pipelines
      - gitlab_get_pipeline
      - gitlab_get_pipeline_terraform_report
      - gitlab_get_pipeline_plan_log
      - gitlab_get_merge_request_approvals
      - gitlab_list_agent_merge_requests
      - gitlab_trigger_drift_check
      - gitlab_get_drift_check_result
      - gitlab_get_repository_tree
    status:
      - iac_status
      - iac_list_stacks
      - iac_list_deployments
      - iac_output
      - iac_state_list
    query_context:
      - kg_deployments_running_stack
      - kg_stacks_using_module
      - kg_stack_instance_history
      - kg_deployment_history
  action_descriptions:
    read_state: when reading live Elastic Cloud topology, versions (one or all deployments), plan history, health, templates, or ILM -- to answer an info question or ground a change before proposing
    read_repo: when reading the IaC repository tree or config-file blobs (environments/<cluster>/**) to locate the file to edit
    propose: when proposing a config change via the GitLab API -- read the config JSON, edit the field, branch and commit server-side (no clone/terraform/local git); CI plans on the MR
    open_mr: when the proposed config edit is committed to the branch and the merge request is opened for human review
    review_pipeline: >-
      when reading an existing MR or its pipelines to report GitOps status (incl. the
      CI-computed terraform plan), or triggering and reading on-demand per-stack
      drift-check results (gitlab_trigger_drift_check and gitlab_get_drift_check_result)
      -- read-only; never merge/approve
    status: when reporting IaC reconcile status, what a stack owns, or its outputs via the repo's read-only task helpers -- read and report, no change required
  action_keywords:
    read_state: [state, deployment, topology, plan history, health, ilm, version, versions, running, list]
    propose: [change, edit, resize, downsize, bump, set, add policy, update]
    open_mr: [mr, merge request, open mr, raise mr]
    status: [status, reconcile, drift, what's deployed, what does it own, state list, output, list stacks, list deployments]
