name: tier-resize-flow
description: >
  End-to-end natural-language tier resize: validate live state, write Terraform
  diff, open MR. Stops at MR open; human merges + applies.

triggers:
  - manual                # user types "resize <cluster> <tier> to <N>GB"

inputs:
  cluster: { type: string, required: true }
  tier: { type: string, required: true }
  new_size_gb: { type: number, required: true }
  new_max_gb: { type: number, required: false }
  reason: { type: string, required: true }

steps:

  validate:
    skill: validate-cluster-state
    inputs:
      cluster: ${{ inputs.cluster }}

  guard:
    tool: bash
    depends_on: [validate]
    conditions:
      # Block hot downsize while .alerts unmanaged
      - ${{ inputs.tier == 'hot' && inputs.new_size_gb < steps.validate.outputs.state.topology.hot.size && steps.validate.outputs.state.ilm_policies < 1 }}
    inputs:
      command: |
        echo "BLOCKED: hot tier downsize gated on .alerts unmanaged fix"
        exit 1

  draft:
    skill: resize-tier
    depends_on: [validate]
    inputs:
      cluster: ${{ inputs.cluster }}
      tier: ${{ inputs.tier }}
      new_size_gb: ${{ inputs.new_size_gb }}
      new_max_gb: ${{ inputs.new_max_gb }}
      reason: ${{ inputs.reason }}

  mr:
    skill: open-mr
    depends_on: [draft]
    inputs:
      branch: ${{ steps.draft.outputs.branch }}
      title: ${{ steps.draft.outputs.title }}
      body: ${{ steps.draft.outputs.body }}
      labels: ["agent-generated", "iac", "tier-resize"]

  notify:
    tool: bash
    depends_on: [mr]
    inputs:
      command: |
        echo "MR opened: ${{ steps.mr.outputs.mr_url }}"
        echo "${{ steps.mr.outputs.mr_url }}" >> memory/runtime/context.md

error_handling:
  on_failure: comment_on_mr_if_exists
  notify_user: true
