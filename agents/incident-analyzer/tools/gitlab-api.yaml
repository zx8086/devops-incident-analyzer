name: gitlab-api
description: >
  Query GitLab API for CI/CD pipeline status, merge requests, commits,
  code analysis, and repository health for incident investigation.
version: 1.0.0
input_schema:
  type: object
  properties:
    action:
      type: string
      enum: [issues, merge_requests, pipelines, search, code_analysis, graph_analysis]
      description: Type of GitLab operation to perform
    project_id:
      type: string
      description: >
        GitLab project ID or URL-encoded path. Required for project-scoped
        actions (issues/merge_requests/pipelines/code_analysis); NOT required
        for graph_analysis (Orbit tools are group-scoped) or search.
    time_from:
      type: string
      format: date-time
      description: Start of time window (ISO 8601)
    time_to:
      type: string
      format: date-time
      description: End of time window (ISO 8601)
    query:
      type: string
      description: Search query or file path
  # project_id is required only for project-scoped actions; graph_analysis
  # (Orbit, group-scoped) and search do not need it. Advisory guidance to the
  # LLM -- the bridge treats input_schema as opaque, so this documents the
  # contract rather than enforcing it at a validation boundary.
  required: []
  allOf:
    - if:
        properties:
          action:
            enum: [issues, merge_requests, pipelines, code_analysis]
      then:
        required: [project_id]
output_schema:
  type: object
  properties:
    results:
      type: array
      items:
        type: object
    total_count: { type: integer }
annotations:
  requires_confirmation: false
  read_only: true
  cost: low

prompt_template: >
  Query GitLab for CI/CD, merge request, and code analysis data.
  {{#if datasources}}Available data sources: {{datasources}}.{{/if}}
  {{#if compliance_tier}}Compliance tier: {{compliance_tier}} -- all queries are logged.{{/if}}

related_tools:
  - "Use elastic-logs to correlate GitLab deployment timing with log error spikes"
  - "Use kafka-consumer-lag to check if deployment correlates with Kafka backpressure"
  - "Use couchbase-cluster-health to verify database health around deployment time"
  - "Use konnect-api-requests to check if API gateway errors appeared after deployment"

tool_mapping:
  mcp_server: gitlab
  mcp_patterns:
    - "gitlab_*"
  action_tool_map:
    issues:
      - gitlab_create_issue
      - gitlab_get_issue
      - gitlab_create_workitem_note
      - gitlab_get_workitem_notes
      - gitlab_get_saved_view_work_items
    merge_requests:
      - gitlab_get_merge_request
      - gitlab_get_merge_request_commits
      - gitlab_get_merge_request_diffs
      - gitlab_get_merge_request_pipelines
      - gitlab_get_merge_request_conflicts
      - gitlab_create_merge_request
    pipelines:
      - gitlab_manage_pipeline
      - gitlab_get_pipeline_jobs
      - gitlab_pipeline_failures
    search:
      - gitlab_search
      - gitlab_search_labels
      - gitlab_semantic_code_search
      - gitlab_recent_deploys
    code_analysis:
      - gitlab_get_file_content
      - gitlab_get_blame
      - gitlab_get_commit_diff
      - gitlab_list_commits
      - gitlab_get_repository_tree
    graph_analysis:
      - gitlab_graph_schema
      - gitlab_blast_radius
      - gitlab_cross_project_callers
      - gitlab_recent_vulnerabilities
      - gitlab_orbit_query_graph
  action_descriptions:
    issues: when querying GitLab issues, comments, labels, or saved views in a project
    merge_requests: when querying merge requests, their commits/diffs/pipelines/conflicts, or MR notes (the primary code-change correlation path)
    pipelines: when checking CI/CD pipeline status, jobs, or recent pipeline failures for a project (or ranking pipeline failures group-wide via Orbit)
    search: when running global text or semantic search across GitLab projects (issues, MRs, commits, blobs), or listing recent deploy MRs group-wide via Orbit
    code_analysis: when reading file content, blame, commit diffs, commit listings, or repository tree (custom REST tools, not the proxied search)
    graph_analysis: >
      when tracing cross-project impact -- who calls a changed definition across
      repos, the blast radius of a file/symbol, or group-wide vulnerabilities
      (GitLab Orbit knowledge graph; group-scoped, no per-project resolution
      needed; consumes GitLab Credits)
  action_keywords:
    graph_analysis: ["blast radius", "cross-project", "who calls", "callers", "downstream", "dependents", "impact", "knowledge graph", "shared library", "importers"]
