name: konnect-api-gateway
description: >
  Query Kong Konnect API gateway for request analytics, service configuration,
  plugin chain inspection, and data plane health for gateway-layer incident diagnosis.
version: 1.0.0
input_schema:
  type: object
  properties:
    action:
      type: string
      enum: [api_requests, service_config, route_config, plugin_chain, data_plane_health, certificate_status, control_plane_management, consumer_management, portal_management]
      description: Type of gateway inspection to perform
    service_name:
      type: string
      description: Service name or ID to inspect
    time_from:
      type: string
      format: date-time
      description: Start of analytics time window (ISO 8601)
    time_to:
      type: string
      format: date-time
      description: End of analytics time window (ISO 8601)
    control_plane:
      type: string
      description: Control plane name or ID
  required: [action]
output_schema:
  type: object
  properties:
    action: { type: string }
    data: { type: object }
    timestamp: { type: string }
annotations:
  requires_confirmation: false
  read_only: true
  cost: low

prompt_template: >
  Query Kong Konnect API gateway for incident diagnosis at the API layer.
  {{#if datasources}}Available data sources: {{datasources}}.{{/if}}
  {{#if compliance_tier}}Compliance tier: {{compliance_tier}} -- all queries are logged.{{/if}}

related_tools:
  - "Use elastic-search-logs to check if backend service errors correlate with gateway error spikes"
  - "Use kafka-consumer-lag to check if event processing issues are caused by gateway routing changes"
  - "Use couchbase-cluster-health to check if database issues are causing upstream timeouts"

tool_mapping:
  mcp_server: konnect
  mcp_patterns:
    - "konnect_*"
  action_tool_map:
    api_requests:
      - query_api_requests
      - get_consumer_requests
      - query_portal_application_analytics
    service_config:
      - list_services
      - get_service
      - create_service
      - update_service
      - delete_service
    route_config:
      - list_routes
      - get_route
      - create_route
      - update_route
      - delete_route
    plugin_chain:
      - list_plugins
      - get_plugin
      - create_plugin
      - update_plugin
      - delete_plugin
      - list_plugin_schemas
    data_plane_health:
      - list_data_plane_nodes
      - get_data_plane_node
      - list_data_plane_tokens
      - create_data_plane_token
      - revoke_data_plane_token
    certificate_status:
      - list_certificates
      - get_certificate
      - create_certificate
      - update_certificate
      - delete_certificate
    control_plane_management:
      - list_control_planes
      - get_control_plane
      - create_control_plane
      - update_control_plane
      - delete_control_plane
      - list_control_plane_group_memberships
      - check_control_plane_group_membership
      - get_control_plane_config
      - update_control_plane_config
    consumer_management:
      - list_consumers
      - get_consumer
      - create_consumer
      - update_consumer
      - delete_consumer
    portal_management:
      - list_portals
      - get_portal
      - create_portal
      - update_portal
      - delete_portal
      - list_portal_products
      - publish_portal_product
      - unpublish_portal_product
      - list_portal_apis
      - fetch_portal_api
      - list_portal_applications
      - get_portal_application
  action_descriptions:
    api_requests: when querying request analytics (request rates, latency percentiles, status code distribution) for a service or route over a time window
    service_config: when inspecting a Kong service definition (host, port, protocol, retries, timeouts) -- the upstream target
    route_config: when inspecting a Kong route definition (path, methods, hosts) -- the request matching layer that points at a service
    plugin_chain: when listing or inspecting plugins applied to a service, route, consumer, or globally (auth, rate-limit, transform, etc.)
    data_plane_health: when checking data plane node health, version, and connection status to the control plane
    certificate_status: when reading TLS certificates, SNIs, or certificate expiry/validity
    control_plane_management: when listing or inspecting control planes and group membership (Konnect orgs and CP groupings)
    consumer_management: when listing or inspecting Kong consumers, their credentials, or group memberships (read-only)
    portal_management: when reading developer portal configuration, published APIs, or developer registrations
