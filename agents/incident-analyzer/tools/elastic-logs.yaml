name: elastic-search-logs
description: >
  Search Elasticsearch logs within a time window for a specific service.
  Returns matching log entries with timestamps, levels, and messages.
version: 1.0.0
input_schema:
  type: object
  properties:
    action:
      type: string
      enum:
        - search
        - cluster_health
        - node_info
        - index_management
        - shard_analysis
        - ingest_pipeline
        - template_management
        - alias_management
        - document_ops
        - snapshot
        - diagnostics
        - cloud_deployment
        - billing
        - transform_management
      description: Type of Elasticsearch operation to perform
    service_name:
      type: string
      description: Service name to filter logs by
    time_from:
      type: string
      format: date-time
      description: Start of time window (ISO 8601)
    time_to:
      type: string
      format: date-time
      description: End of time window (ISO 8601)
    level:
      type: string
      enum: [error, warn, info, debug]
      description: Minimum log level
    query:
      type: string
      description: Free-text search query
    deployment:
      type: string
      description: Target Elasticsearch deployment ID
    max_results:
      type: integer
      default: 100
      description: Maximum number of log entries to return
  required: [service_name, time_from, time_to]
output_schema:
  type: object
  properties:
    logs:
      type: array
      items:
        type: object
        properties:
          timestamp: { type: string }
          level: { type: string }
          message: { type: string }
          service: { type: string }
    total_hits: { type: integer }
annotations:
  requires_confirmation: false
  read_only: true
  cost: low

prompt_template: >
  Search Elasticsearch logs within a time window for a specific service.
  Returns matching log entries with timestamps, levels, and messages.
  {{#if datasources}}Available data sources: {{datasources}}.{{/if}}
  {{#if compliance_tier}}Compliance tier: {{compliance_tier}} -- all queries are logged.{{/if}}

related_tools:
  - "Use kafka-consumer-lag to check if log spikes correlate with Kafka backpressure"
  - "Use couchbase-cluster-health to verify database health during the same time window"
  - "Use konnect-api-requests to check if API gateway errors correlate with log patterns"
  - "Use aggregate-findings skill to correlate logs with events and datastore metrics"

tool_mapping:
  mcp_server: elastic
  mcp_patterns:
    - "elasticsearch_*"
  action_tool_map:
    search:
      - elasticsearch_search
      - elasticsearch_multi_search
      - elasticsearch_scroll_search
      - elasticsearch_clear_scroll
      - elasticsearch_count_documents
      - elasticsearch_execute_sql_query
      - elasticsearch_translate_sql_query
      - elasticsearch_search_template
      - elasticsearch_multi_search_template
    cluster_health:
      - elasticsearch_get_cluster_health
      - elasticsearch_get_cluster_stats
      - elasticsearch_diagnostics
    node_info:
      - elasticsearch_get_nodes_info
      - elasticsearch_get_nodes_stats
    index_management:
      - elasticsearch_list_indices
      - elasticsearch_indices_summary
      - elasticsearch_get_index
      - elasticsearch_get_index_info
      - elasticsearch_get_mappings
      - elasticsearch_get_index_settings
      - elasticsearch_get_index_settings_advanced
      - elasticsearch_create_index
      - elasticsearch_delete_index
      - elasticsearch_index_exists
      - elasticsearch_update_index_settings
      - elasticsearch_put_mapping
      - elasticsearch_refresh_index
      - elasticsearch_flush_index
      - elasticsearch_rollover
      - elasticsearch_field_usage_stats
      - elasticsearch_disk_usage
    shard_analysis:
      - elasticsearch_get_shards
    ingest_pipeline:
      - elasticsearch_get_ingest_pipeline
      - elasticsearch_put_ingest_pipeline
      - elasticsearch_delete_ingest_pipeline
      - elasticsearch_simulate_ingest_pipeline
      - elasticsearch_processor_grok
    template_management:
      - elasticsearch_get_index_template
      - elasticsearch_put_index_template
      - elasticsearch_delete_index_template
      - elasticsearch_exists_index_template
      - elasticsearch_exists_template
    alias_management:
      - elasticsearch_get_aliases
      - elasticsearch_put_alias
      - elasticsearch_delete_alias
      - elasticsearch_update_aliases
      - elasticsearch_exists_alias
    document_ops:
      - elasticsearch_get_document
      - elasticsearch_index_document
      - elasticsearch_update_document
      - elasticsearch_delete_document
      - elasticsearch_document_exists
      - elasticsearch_bulk_operations
      - elasticsearch_multi_get
      - elasticsearch_reindex_documents
      - elasticsearch_delete_by_query
      - elasticsearch_update_by_query
    snapshot:
      - elasticsearch_get_data_lifecycle_stats
      - elasticsearch_explain_data_lifecycle
      - elasticsearch_ilm_get_lifecycle
      - elasticsearch_ilm_explain_lifecycle
      - elasticsearch_ilm_get_status
      - elasticsearch_delete_data_stream
    diagnostics:
      - elasticsearch_diagnostics
      - elasticsearch_get_cluster_health
      - elasticsearch_get_cluster_stats
      - elasticsearch_list_tasks
      - elasticsearch_tasks_get_task
      - elasticsearch_get_field_mapping
    # SIO-674: Elastic Cloud Deployment API tools (api.elastic-cloud.com). Only register
    # when EC_API_KEY is set; otherwise the agent should not select this action.
    cloud_deployment:
      - elasticsearch_cloud_list_deployments
      - elasticsearch_cloud_get_deployment
      - elasticsearch_cloud_get_plan_activity
      - elasticsearch_cloud_get_plan_history
    # SIO-674: Elastic Cloud Billing Costs Analysis API tools.
    billing:
      - elasticsearch_billing_get_org_costs
      - elasticsearch_billing_get_deployment_costs
      - elasticsearch_billing_get_org_charts
    # SIO-830: Elasticsearch _transform/* API tools (data transforms lifecycle).
    transform_management:
      - elasticsearch_get_transform
      - elasticsearch_get_transform_stats
      - elasticsearch_list_transforms
      - elasticsearch_start_transform
      - elasticsearch_stop_transform
      - elasticsearch_put_transform
      - elasticsearch_update_transform
      - elasticsearch_delete_transform
      - elasticsearch_preview_transform
      - elasticsearch_get_transform_notifications
  action_descriptions:
    search: >-
      when querying logs by service, time window, and search terms (the primary log-search
      path; covers structured queries, aggregations, and free-text). IMPORTANT -- a service may
      ship to `logs-*` AND/OR to the OpenTelemetry APM streams `logs-apm.app.*` (app logs) and
      `logs-apm.error-*` (errors/exceptions); it can be in either or both. Do NOT treat any one
      family as authoritative and do NOT assume `logs-*` is empty just because APM has data (or
      vice versa) -- search across `logs-*,logs-apm.*`. An incident's short service name is often
      NOT the Elasticsearch `service.name`: the APM `service.name` may carry a prefix/suffix (e.g.
      the incident name `styles-v3` is `pvh-services-styles-v3` in APM; the backing index
      sanitizes it to `.ds-logs-apm.app.pvh_services_styles_v3-default-*`), and other datasources
      may anchor on either form. Do NOT conclude a service is absent from a single index-pattern +
      literal-`service.name` query. When a named service returns zero, FIRST run one discovery
      aggregation -- a `service.name` terms agg (size 0) over BOTH families (`logs-*,logs-apm.*`)
      -- and match the anchor against the returned names under BOTH forms (bare `styles-v3` and
      prefixed `pvh-services-styles-v3`, in either direction), then search wherever it resolved.
      Distinguish "service not present" from "service present but the cited error string is not
      observed" -- and before claiming an error is unobserved, check the APM ERROR stream
      (`logs-apm.error-*`): SDK/DB connection errors (e.g. `finishConnect(..) failed: Connection
      refused`) surface there, not in the app-log INFO stream. For billion-doc indices
      (traces-apm*, logs-apm*), narrow the index pattern (date suffix or specific index name
      beats `traces-apm*`), use the shortest viable time window (prefer `now-24h` over
      `now-7d`), project only needed fields via `_source` or `fields`, and avoid fanning out
      multiple heavy aggregations in parallel -- run them sequentially so each gets the full
      per-call timeout budget
    cluster_health: when checking cluster status, node count, shard allocation, or pending tasks at the cluster level
    node_info: when inspecting a specific node's hardware, JVM, thread pools, or per-node disk/memory usage
    index_management: when listing indices, checking index settings, mappings, stats, or rolling over an index pattern
    shard_analysis: when investigating shard distribution, allocation explain, or relocation/initialization issues
    ingest_pipeline: when reading ingest pipeline definitions or simulating pipeline execution against sample documents
    template_management: when reading or updating index/component templates (controls index settings/mappings at creation time)
    alias_management: when reading aliases, alias filters, or routing settings (cross-index views and write-target indirection)
    document_ops: when reading specific documents by ID, counting matches, or running aggregations against a known index (read-only)
    snapshot: when listing snapshot repositories or snapshots, or checking snapshot/restore status
    diagnostics: when running cluster-wide diagnostic commands (allocation explain, hot threads, pending tasks) for deep troubleshooting
    cloud_deployment: when listing or describing Elastic Cloud deployments via the v1 cloud API (metadata only -- region, plan, version, capacity; for cost or spend data use `billing` instead)
    billing: when checking Elastic Cloud organization or deployment billing/cost data via the v2 billing API (read-only cost reporting)
    transform_management: >-
      when creating, inspecting, starting, stopping, updating, previewing, or deleting an
      Elasticsearch `_transform` (pivot or latest aggregation). Includes `_stats` polling for
      checkpoint progress and indexer state, and reading the `.transform-notifications-*` audit
      log. Use this action for transform lifecycle work and dormancy/split-brain investigations.
