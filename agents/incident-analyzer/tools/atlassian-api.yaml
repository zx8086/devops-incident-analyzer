name: atlassian-api
description: >
  Query Jira and Confluence via Atlassian Rovo MCP for linked incident
  tickets, runbook pages, and historical incident trends. Read-only.
version: 1.0.0
input_schema:
  type: object
  properties:
    action:
      type: string
      enum: [incident_correlation, runbook_lookup, jira_query, confluence_query]
      description: Type of Atlassian operation to perform
    service:
      type: string
      description: Service name for incident or runbook search
    time_from:
      type: string
      format: date-time
      description: Start of time window (ISO 8601)
    time_to:
      type: string
      format: date-time
      description: End of time window (ISO 8601)
    query:
      type: string
      description: JQL, CQL, or free-text query
  required: [action]
output_schema:
  type: object
  properties:
    results:
      type: array
      items:
        type: object
    total_count: { type: integer }
annotations:
  requires_confirmation: false
  read_only: true
  cost: low

prompt_template: >
  Query Atlassian for Jira incidents and Confluence runbooks.
  {{#if datasources}}Available data sources: {{datasources}}.{{/if}}
  {{#if compliance_tier}}Compliance tier: {{compliance_tier}} -- read-only queries only.{{/if}}

related_tools:
  - "Use elastic-logs to correlate Jira incident time windows with log spikes"
  - "Use gitlab-api to cross-reference deploy timing with incident creation"
  - "Use konnect-gateway to check whether API gateway errors align with ticket timeline"

tool_mapping:
  mcp_server: atlassian
  mcp_patterns:
    - "atlassian_*"
    - "findLinkedIncidents"
    - "getRunbookForAlert"
    - "getIncidentHistory"
  action_tool_map:
    # SIO-1096: every discovery action exposes the broad Rovo `atlassian_search` FIRST. The
    # service-keyed composers (findLinkedIncidents / getRunbookForAlert) miss tickets/pages that
    # aren't tagged with the service -- which is most of them, since Jira work lives under
    # team/product names (DSD, BP, PANDP) and business terms (AFS/FMS season code), not the
    # service token. atlassian_search cross-searches Jira+Confluence by free text and finds them.
    # SIO-1154: incident_correlation and runbook_lookup carried search tools but no page
    # READER -- the sub-agent found pages by CQL/search, then had no tool to fetch the body
    # and reported "content not retrieved" gaps. Search-then-read requires the reader on
    # the same belt.
    # SIO-1159: same gap, Jira half. findLinkedIncidents returns only {key, summary,
    # status, mttrMinutes} -- run 270378e0 surfaced a related ticket but had no tool to
    # fetch its body and reported "content not fully retrieved". The Jira reader (and
    # the JQL search for follow-ups) belongs on the incident belt, mirroring SIO-1154.
    # SIO-1182: third round of the same class. atlassian_search results carry an ARI in
    # `id`; the matching reader atlassian_fetch was on NO belt, so the model either
    # reported "content not fully retrieved" (silent) or guessed the wrong reader
    # (getConfluencePage fed a Jira key -> upstream 400). atlassian_fetch goes on EVERY
    # belt -- the ARI self-describes the entity type, so no reader guessing -- and the
    # two belts that had no Jira reader (runbook_lookup, confluence_query) get
    # atlassian_getJiraIssue for bare issue keys.
    incident_correlation:
      - atlassian_search
      - atlassian_fetch
      - findLinkedIncidents
      - getIncidentHistory
      - atlassian_getConfluencePage
      - atlassian_getJiraIssue
      - atlassian_searchJiraIssuesUsingJql
    runbook_lookup:
      - atlassian_search
      - atlassian_fetch
      - getRunbookForAlert
      - atlassian_searchConfluenceUsingCql
      - atlassian_getConfluencePage
      - atlassian_getJiraIssue
    jira_query:
      - atlassian_search
      - atlassian_fetch
      - atlassian_searchJiraIssuesUsingJql
      - atlassian_getJiraIssue
      # SIO-1154: atlassian_search cross-searches Confluence, so even a Jira-focused
      # action can surface a page that must be READ before it is cited.
      # SIO-1159: dropped atlassian_getJiraIssueComments -- not a real upstream tool;
      # comments arrive via atlassian_getJiraIssue's triage preset.
      - atlassian_getConfluencePage
    confluence_query:
      - atlassian_search
      - atlassian_fetch
      - atlassian_searchConfluenceUsingCql
      - atlassian_getConfluencePage
      - atlassian_getJiraIssue
  action_descriptions:
    # SIO-1182: pick the reader by the id you HOLD -- an `id` from atlassian_search results is an
    # ARI (ari:cloud:...) and goes to atlassian_fetch; a bare issue key (ABC-123) goes to
    # atlassian_getJiraIssue; a numeric pageId goes to atlassian_getConfluencePage. Never feed an
    # issue key to the Confluence page reader or a URL to atlassian_fetch.
    incident_correlation: >-
      Jira tickets for an incident. START with atlassian_search over the incident's domain terms,
      THEN findLinkedIncidents/getIncidentHistory. The service token misses most. READ every search
      hit you cite via its `id` (an ARI) with atlassian_fetch. For a bare issue key use
      atlassian_getJiraIssue; for a numeric Confluence pageId use atlassian_getConfluencePage --
      key+summary alone is not evidence.
    runbook_lookup: >-
      finding Confluence runbooks/ops docs. START with atlassian_search over the failure's domain
      terms, THEN getRunbookForAlert. A service-token-only search misses domain-named pages. READ
      the body of anything you cite: search-hit `id` (ARI) -> atlassian_fetch, numeric pageId ->
      atlassian_getConfluencePage, Jira issue key -> atlassian_getJiraIssue -- a title/snippet is
      not evidence.
    jira_query: >-
      when running an explicit JQL query against Jira (direct, not the smart incident-correlation
      composer). Read result bodies: ARI -> atlassian_fetch, issue key -> atlassian_getJiraIssue.
    confluence_query: >-
      when running an explicit CQL query against Confluence (direct, not the smart runbook-lookup
      composer). Read result bodies: ARI -> atlassian_fetch, numeric pageId ->
      atlassian_getConfluencePage, Jira issue key -> atlassian_getJiraIssue.
