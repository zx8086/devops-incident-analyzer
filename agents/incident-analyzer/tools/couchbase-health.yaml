name: couchbase-cluster-health
description: >
  Query Couchbase Capella cluster health, performance metrics, and
  N1QL query analysis for database-related incident diagnosis.
version: 1.1.0
input_schema:
  type: object
  properties:
    action:
      type: string
      enum: [system_vitals, fatal_requests, slow_queries, expensive_queries, index_analysis, node_status, document_ops, query_execution]
      description: Type of health check to perform
    bucket:
      type: string
      description: Target bucket name (optional, uses default if not specified)
    limit:
      type: integer
      default: 10
      description: Maximum results to return
  required: [action]
output_schema:
  type: object
  properties:
    action: { type: string }
    data: { type: object }
    timestamp: { type: string }
annotations:
  requires_confirmation: false
  read_only: true
  cost: low

prompt_template: >
  Query Couchbase Capella health and performance for incident diagnosis.
  {{#if datasources}}Available data sources: {{datasources}}.{{/if}}
  {{#if compliance_tier}}Compliance tier: {{compliance_tier}} -- all queries are logged.{{/if}}

related_tools:
  - "Use elastic-search-logs to check if database errors appear in application logs"
  - "Use kafka-consumer-lag to check if database slowness is causing event processing delays"
  - "Use konnect-api-requests to check if API latency correlates with database performance"

tool_mapping:
  mcp_server: couchbase
  mcp_patterns:
    - "capella_*"
  action_tool_map:
    system_vitals:
      - capella_get_system_vitals
      - capella_get_system_nodes
      - capella_get_cluster_health
      - capella_ping
    fatal_requests:
      - capella_get_fatal_requests
      - capella_get_completed_requests
      - capella_explain_sql_plus_plus_query
      - capella_get_index_advisor_recommendations
    slow_queries:
      - capella_get_longest_running_queries
      - capella_get_most_expensive_queries
      - capella_get_most_frequent_queries
      - capella_get_largest_result_size_queries
      - capella_get_largest_result_count_queries
      - capella_explain_sql_plus_plus_query
      - capella_get_index_advisor_recommendations
    expensive_queries:
      - capella_get_most_expensive_queries
      - capella_get_longest_running_queries
      - capella_get_primary_index_queries
      - capella_get_non_covering_index_queries
      - capella_get_low_selectivity_queries
      - capella_explain_sql_plus_plus_query
      - capella_get_index_advisor_recommendations
    index_analysis:
      - capella_get_system_indexes
      - capella_get_indexes_to_drop
      - capella_get_detailed_indexes
      - capella_get_index_advisor_recommendations
      - capella_get_non_covering_index_queries
      - capella_get_low_selectivity_queries
      - capella_explain_sql_plus_plus_query
    node_status:
      - capella_get_system_nodes
      - capella_get_system_vitals
      - capella_get_cluster_health
    document_ops:
      - capella_get_document_by_id
      - capella_get_buckets
      - capella_get_scopes_and_collections
      - capella_get_schema_for_collection
      - capella_get_document_type_examples
      - capella_analyze_document_structure
    query_execution:
      - capella_run_sql_plus_plus_query
      - capella_explain_sql_plus_plus_query
      # SIO-1198: index discovery MUST be on the same belt as query execution --
      # the SOUL's mandatory protocol requires listing indexes BEFORE the first
      # SELECT, which is impossible if these only ship with index_analysis.
      - capella_get_system_indexes
      - capella_get_detailed_indexes
      - capella_get_document_by_id
      - capella_get_prepared_statements
      - capella_get_detailed_prepared_statements
      - capella_suggest_query_optimizations
      - capella_get_index_advisor_recommendations
  action_descriptions:
    system_vitals: when checking cluster-wide CPU, memory, disk, and replication health (the primary cluster-state path)
    fatal_requests: >-
      when investigating queries that hit fatal errors (timeouts, OOM, malformed responses) -- true failures,
      not slow queries; also carries EXPLAIN + Index Advisor to diagnose the failing statements
    slow_queries: >-
      when investigating queries above the slow-query threshold by elapsed time (latency outliers, not
      failures); also carries EXPLAIN + Index Advisor to check surfaced statements for index problems
    expensive_queries: >-
      when investigating queries with high resource cost (memory, CPU, scan size, non-covering fetches) --
      can be fast OR slow; also carries EXPLAIN + Index Advisor to check surfaced statements for index problems
    index_analysis: when reading GSI/secondary index definitions or stats, running the server-computed Index Advisor on a query, or sweeping for non-covering / low-selectivity query patterns
    node_status: when checking individual cluster node status (services running, version, uptime) -- not cluster-wide health
    document_ops: when listing buckets/scopes/collections or reading specific documents by key (read-only K/V access)
    query_execution: >-
      when running an N1QL SELECT query or EXPLAIN plan (read-only; the compliance layer rejects
      mutations). ALWAYS call capella_get_system_indexes BEFORE the first SELECT of the turn and
      lead every WHERE on a listed index's first key -- a code-4000 "no index available" response
      means the protocol was skipped, never that data is missing
