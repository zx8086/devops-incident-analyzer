name: couchbase-cluster-health
description: >
  Query Couchbase Capella cluster health, performance metrics, and
  N1QL query analysis for database-related incident diagnosis.
version: 1.0.0
input_schema:
  type: object
  properties:
    action:
      type: string
      enum: [system_vitals, fatal_requests, slow_queries, expensive_queries, index_analysis, node_status, document_ops, query_execution]
      description: Type of health check to perform
    bucket:
      type: string
      description: Target bucket name (optional, uses default if not specified)
    limit:
      type: integer
      default: 10
      description: Maximum results to return
  required: [action]
output_schema:
  type: object
  properties:
    action: { type: string }
    data: { type: object }
    timestamp: { type: string }
annotations:
  requires_confirmation: false
  read_only: true
  cost: low

prompt_template: >
  Query Couchbase Capella health and performance for incident diagnosis.
  {{#if datasources}}Available data sources: {{datasources}}.{{/if}}
  {{#if compliance_tier}}Compliance tier: {{compliance_tier}} -- all queries are logged.{{/if}}

related_tools:
  - "Use elastic-search-logs to check if database errors appear in application logs"
  - "Use kafka-consumer-lag to check if database slowness is causing event processing delays"
  - "Use konnect-api-requests to check if API latency correlates with database performance"

tool_mapping:
  mcp_server: couchbase
  mcp_patterns:
    - "capella_*"
  action_tool_map:
    system_vitals:
      - capella_get_system_vitals
      - capella_get_system_nodes
      - capella_health_check
      - capella_ping
    fatal_requests:
      - capella_get_fatal_requests
      - capella_get_completed_requests
    slow_queries:
      - capella_get_longest_running_queries
      - capella_get_most_expensive_queries
      - capella_get_most_frequent_queries
      - capella_get_largest_result_size_queries
      - capella_get_largest_result_count_queries
    expensive_queries:
      - capella_get_most_expensive_queries
      - capella_get_longest_running_queries
      - capella_get_primary_index_queries
    index_analysis:
      - capella_get_system_indexes
      - capella_get_indexes_to_drop
      - capella_get_detailed_indexes
    node_status:
      - capella_get_system_nodes
      - capella_get_system_vitals
      - capella_get_diagnostics
    document_ops:
      - capella_get_document_by_id
      - capella_get_scopes_and_collections
      - capella_get_schema_for_collection
      - capella_get_document_type_examples
      - capella_analyze_document_structure
    query_execution:
      - capella_run_sql_plus_plus_query
      - capella_get_prepared_statements
      - capella_get_detailed_prepared_statements
      - capella_suggest_query_optimizations
