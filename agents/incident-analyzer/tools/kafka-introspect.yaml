name: kafka-introspect
description: >
  Inspect and (when enabled) manage Kafka cluster state including consumer
  group lag, topic throughput, dead-letter queue contents, schema registry,
  ksqlDB, Kafka Connect, and REST Proxy. Write and destructive tools are
  gated at the MCP server by KAFKA_ALLOW_WRITES / KAFKA_ALLOW_DESTRUCTIVE
  and at the kafka-agent by SOUL.md / RULES.md.
version: 2.0.0
input_schema:
  type: object
  properties:
    action:
      type: string
      enum:
        - consumer_lag
        - topic_throughput
        - dlq_messages
        - cluster_info
        - describe_topic
        - schema_registry
        - schema_management
        - ksql
        - connect_status
        - connect_management
        - restproxy
        - write_ops
      description: Type of Kafka inspection or management operation
    consumer_group:
      type: string
      description: Consumer group ID (required for consumer_lag)
    topic:
      type: string
      description: Topic name (required for topic_throughput, dlq_messages, describe_topic)
    max_messages:
      type: integer
      default: 10
      description: Maximum messages to return for DLQ inspection
  required: [action]
output_schema:
  type: object
  properties:
    action: { type: string }
    data: { type: object }
    timestamp: { type: string }
annotations:
  requires_confirmation: true
  read_only: false
  cost: low

prompt_template: >
  Inspect Kafka cluster state for incident diagnosis.
  {{#if datasources}}Available data sources: {{datasources}}.{{/if}}
  {{#if compliance_tier}}Compliance tier: {{compliance_tier}} -- all queries are logged.{{/if}}

related_tools:
  - "Use elastic-search-logs to check if consumer lag correlates with application error spikes"
  - "Use couchbase-cluster-health to check if database slowness is causing Kafka backpressure"
  - "Use konnect-api-requests to check if upstream API errors are generating DLQ messages"
  - "Use gitlab-pipeline-jobs to correlate Connect connector restarts and REST Proxy producer changes with recent deploys"

tool_mapping:
  mcp_server: kafka
  mcp_patterns:
    - "kafka_*"
    - "ksql_*"
    - "sr_*"
    - "connect_*"
    - "restproxy_*"
  action_tool_map:
    consumer_lag:
      - kafka_list_consumer_groups
      - kafka_describe_consumer_group
      - kafka_get_consumer_group_lag
    topic_throughput:
      - kafka_list_topics
      - kafka_describe_topic
      - kafka_get_topic_offsets
    dlq_messages:
      - kafka_consume_messages
      - kafka_get_message_by_offset
    cluster_info:
      - kafka_get_cluster_info
      - kafka_describe_cluster
    describe_topic:
      - kafka_describe_topic
      - kafka_get_topic_offsets
      - kafka_list_topics
    schema_registry:
      - kafka_list_schemas
      - kafka_get_schema
      - kafka_get_schema_versions
      - kafka_check_compatibility
      - kafka_get_schema_config
      - kafka_register_schema
      - kafka_set_schema_config
      - kafka_delete_schema_subject
    schema_management:
      - sr_register_schema
      - sr_check_compatibility
      - sr_set_compatibility
      - sr_soft_delete_subject
      - sr_soft_delete_subject_version
      - sr_hard_delete_subject
      - sr_hard_delete_subject_version
    ksql:
      - ksql_get_server_info
      - ksql_list_streams
      - ksql_list_tables
      - ksql_list_queries
      - ksql_describe
      - ksql_run_query
      - ksql_execute_statement
    connect_status:
      - connect_get_cluster_info
      - connect_list_connectors
      - connect_get_connector_status
      - connect_get_connector_task_status
    connect_management:
      - connect_pause_connector
      - connect_resume_connector
      - connect_restart_connector
      - connect_restart_connector_task
      - connect_delete_connector
    restproxy:
      - restproxy_list_topics
      - restproxy_get_topic
      - restproxy_get_partitions
      - restproxy_produce
      - restproxy_create_consumer
      - restproxy_subscribe
      - restproxy_consume
      - restproxy_commit_offsets
      - restproxy_delete_consumer
    write_ops:
      - kafka_produce_message
      - kafka_create_topic
      - kafka_alter_topic_config
      - kafka_delete_topic
      - kafka_reset_consumer_group_offsets
  action_descriptions:
    consumer_lag: when a consumer group shows rising or sustained message lag (e.g. >10k messages, processing latency growing, or stalled partitions)
    topic_throughput: when investigating producer rate, consumer rate, or partition offsets on a specific topic
    dlq_messages: when inspecting dead-letter queue contents (topics suffixed with -dlq, .DLQ, dead-letter-, or similar)
    cluster_info: when checking cluster-wide health (broker count, controller, version) -- not topic- or group-specific
    describe_topic: when needing partition count, replication factor, retention config, or per-partition offsets for a known topic
    schema_registry: when reading Avro/Protobuf/JSON schemas, subject versions, or compatibility config (read-only)
    schema_management: when registering, evolving, or deleting schemas in the Schema Registry (gated by KAFKA_ALLOW_WRITES / KAFKA_ALLOW_DESTRUCTIVE)
    ksql: when querying ksqlDB streams, tables, persistent queries, or running ad-hoc KSQL statements
    connect_status: when Kafka Connect connectors or tasks are failing, paused, or in unknown state -- read-only inspection
    connect_management: when pausing, resuming, restarting, or deleting Kafka Connect connectors (gated by KAFKA_ALLOW_WRITES / KAFKA_ALLOW_DESTRUCTIVE)
    restproxy: when producing to or consuming from Kafka via the Confluent REST Proxy v2 API (writes gated by KAFKA_ALLOW_WRITES)
    write_ops: when producing test messages, creating/altering topics, deleting topics, or resetting consumer group offsets (gated by KAFKA_ALLOW_WRITES / KAFKA_ALLOW_DESTRUCTIVE)
  action_keywords:
    connect_status:
      - kafka connect
      - connector
      - connectors
      - connect rest
    connect_management:
      - pause connector
      - resume connector
      - restart connector
      - delete connector
    restproxy:
      - rest proxy
      - restproxy
      - confluent rest
    ksql:
      - ksql
      - ksqldb
      - ksql query
    schema_registry:
      - schema registry
      - avro schema
      - subject version
    schema_management:
      - register schema
      - schema compatibility
      - evolve schema
    dlq_messages:
      - dead letter
      - dead-letter
      - dlq
