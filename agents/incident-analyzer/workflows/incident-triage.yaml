name: incident-triage
version: 0.1.0
description: >
  Standard incident triage. Augments (does not replace) the LangGraph pipeline:
  the heavy analysis runs as a single graph step, with deterministic wiki/memory
  steps chained around it.

triggers:
  - type: manual

steps:
  # Pull the relevant compiled wiki pages for the incident context.
  - name: pre_wiki
    skill: wiki-query
    description: Select relevant wiki pages before analysis
    outputs:
      - pages

  # Run the entire compiled incident-analysis graph as one capability. The graph
  # owns intra-analysis routing (entity extraction, fan-out, correlation,
  # mitigation); the workflow does not re-implement it.
  - name: triage
    graph: true
    description: Run the full incident-analysis graph
    depends_on:
      - pre_wiki
    with:
      wiki: ${{ steps.pre_wiki.outputs.pages }}
    outputs:
      - report
      - confidence

  # Compile the finished investigation into a wiki-page update proposal.
  - name: post_wiki
    skill: wiki-ingest
    description: Propose a wiki update from the investigation report
    depends_on:
      - triage
    with:
      report: ${{ steps.triage.outputs.report }}
    outputs:
      - proposal

  # Open a review PR for the durable learning. Tolerant: a failure here must not
  # fail the triage that already produced a report.
  - name: learn
    tool: memory-pr
    description: Open a human-review PR for the wiki/memory update
    depends_on:
      - post_wiki
    with:
      proposal: ${{ steps.post_wiki.outputs.proposal }}
    error_handling: continue

error_handling: best_effort
