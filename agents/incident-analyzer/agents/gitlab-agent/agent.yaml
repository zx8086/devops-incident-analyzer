spec_version: "0.1.0"
name: gitlab-agent
version: 0.1.0
description: Read-only GitLab CI/CD, merge request, and code analysis specialist.

model:
  preferred: claude-haiku-4-5
  constraints:
    temperature: 0.1
    max_tokens: 2048

tools:
  - gitlab-api

# SIO-1180: tool-usage/investigation procedures, refactored out of SOUL.md
# (identity stays in SOUL; procedures are modular skills, mirroring how
# gitlab-org/ai/skills encodes glab workflows). All three render into the
# system prompt via the SIO-1014 catalog + body mechanism.
skills:
  - project-resolution
  - code-search-selection
  - code-change-correlation

compliance:
  risk_tier: low
  data_governance:
    pii_handling: redact
