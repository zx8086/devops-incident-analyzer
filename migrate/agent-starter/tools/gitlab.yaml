id: gitlab
description: GitLab MCP — repo tree, file blobs, branches, commits, MRs, pipelines
mcp_server: mcp-server-gitlab
required_actions:
  - gitlab_get_repository_tree
  - gitlab_get_file_content
  - gitlab_create_merge_request
  - gitlab_get_merge_request
  - gitlab_list_merge_requests
  - gitlab_get_merge_request_diffs
  - gitlab_get_merge_request_pipelines
  - gitlab_manage_pipeline
  - gitlab_create_workitem_note
forbidden_actions:
  # SOD: maker cannot approve/merge
  - gitlab_approve_mr
  - gitlab_merge_mr
auth: oauth (user-scoped, project_id=71488350)
